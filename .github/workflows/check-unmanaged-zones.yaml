name: Check Unmanaged Zones

on:
  schedule:
    - cron: "0 0 * * 1-5" # Runs at 00:00 from Monday to Friday
  workflow_dispatch: # Allows manual triggering

permissions: {}

jobs:
  check-zones:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          make install

      - name: Run check for unmanaged zones
        id: check-zones
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OCTODNS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCTODNS_AWS_SECRET_ACCESS_KEY }}
          PYTHONUNBUFFERED: 1
        run: |
          set -o pipefail
          if make check-unmanaged-zones 2>&1 | tee /tmp/check-unmanaged-zones.log; then
            status=0
          else
            status=$?
          fi
          {
            echo "result<<EOF"
            cat /tmp/check-unmanaged-zones.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$status"
